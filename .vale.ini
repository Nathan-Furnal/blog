StylesPath = styles

MinAlertLevel = suggestion

Packages = proselint

[*.{md,rst}]
BasedOnStyles = Vale, proselint

# Ignore code blocks and other technical elements
TokenIgnores = (\.\. code-block::.*?(?=\n\S)), \
               (`[^`]+`), \
               (``[^`]+``), \
               (\.\. [a-zA-Z-]+::.*?(?=\n\S)), \
               (:[a-zA-Z-]+:`[^`]+`), \
               (\.\. _[^:]+:.*), \
               (^   .*$)
